repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^llm_engine/
      - id: ruff-format
        files: ^llm_engine/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'mypy llm_engine --ignore-missing-imports --no-strict-optional || true'
        language: system
        types: [python]
        pass_filenames: false
        always_run: false

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: bandit
        language: system
        types: [python]
        args: ["-r", "llm_engine/", "-ll"]
        pass_filenames: false
        always_run: false
